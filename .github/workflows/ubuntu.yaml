name: ubuntu build

on:
  push:
    branches:
      - main
      - feature/*
    paths:
      - image/**
      - ubuntu/Chapter*.md
      - ubuntu/image/**
      - ubuntu/config-pdf.yaml
      - ubuntu/config-epub.yaml
      - listing.tex
      - template.tex
      - .github/workflows/pandoc.yaml
      - .github/workflows/ubuntu.yaml

jobs:
  build:
    uses: ./.github/workflows/pandoc.yaml
    with:
      working-directory: ./ubuntu
