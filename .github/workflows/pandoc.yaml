on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string

jobs:
  check-consistency:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: sh
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v5
      - name: Check version/date consistency
        run: |
          PDF_VER=$(grep -oP 'Ver\.\d+\.\d+\.\d+' config-pdf.yaml)
          EPUB_VER=$(grep -oP 'Ver\.\d+\.\d+\.\d+' config-epub.yaml)
           if [ "${{ inputs.working-directory }}" = "main-en" ]; then
             # English format: February 18, 2026
             PDF_DATE_EN=$(grep bookVersion config-pdf.yaml | grep -oP '[A-Z][a-z]+ \d+, \d{4}')
             PDF_DATE=$(echo "$PDF_DATE_EN" | awk '{
               months["January"]=1; months["February"]=2; months["March"]=3; months["April"]=4;
               months["May"]=5; months["June"]=6; months["July"]=7; months["August"]=8;
               months["September"]=9; months["October"]=10; months["November"]=11; months["December"]=12;
               month = $1; day = $2; sub(",", "", day); year = $3;
               printf "%04d-%02d-%02d", year, months[month], day
             }')
           else
             # Japanese format: 2026年2月18日
             PDF_DATE_JP=$(grep bookVersion config-pdf.yaml | grep -oP '\d+年\d+月\d+日')
             PDF_DATE=$(echo "$PDF_DATE_JP" | sed 's/年/-/g;s/月/-/g;s/日//' | awk -F'-' '{printf "%04d-%02d-%02d", $1, $2, $3}')
           fi
          EPUB_DATE=$(grep -oP '(?<=date: )\d{4}-\d{2}-\d{2}' config-epub.yaml)
          ERROR=0
          if [ "$PDF_VER" != "$EPUB_VER" ]; then
            echo "::error::Version mismatch! config-pdf.yaml=$PDF_VER, config-epub.yaml=$EPUB_VER"
            ERROR=1
          fi
          if [ "$PDF_DATE" != "$EPUB_DATE" ]; then
            echo "::error::Date mismatch! config-pdf.yaml=$PDF_DATE, config-epub.yaml=$EPUB_DATE"
            ERROR=1
          fi
          if [ $ERROR -eq 0 ]; then echo "Version/Date OK: $PDF_VER / $EPUB_DATE"; fi
          exit $ERROR

  build-pdf:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: sh
        working-directory: ${{ inputs.working-directory }}
    container:
      image: ghcr.io/lpi-japan/server-text:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.github_token }}
    steps:
      - uses: actions/checkout@v5
      - run: |
          chapters=$(ls -1 Chapter*.md | grep -v 'Chapter00.md' | sort -V | tr '\n' ' ' | sed 's/ $//')
          template_path="../template.tex"
          if [ "${{ inputs.working-directory }}" = "main-en" ]; then
            template_path="../template-en.tex"
          fi
          pandoc Chapter00.md -o preface.tex # 前書きだけ目次の前に出すために先にtex化しておく
          # 電子版 = 表紙あり、製本・kindleペーパーバック用 = 表紙なし (表紙は別納)
          # まずmd → texまで変換しtex → pdfだけ表紙有無分岐するとより高速だが、toc解決の複雑さを回避するため全行程を2周する
          pandoc -d config-pdf.yaml --template ${template_path} -B preface.tex ${chapters} -o guide.pdf --verbose 2>&1 | grep -v '^  '
          pandoc -d config-pdf.yaml --template ${template_path} -B preface.tex ${chapters} -M no-cover=true -o guide_no_cover.pdf --verbose 2>&1 | grep -v '^  '
      - uses: actions/upload-artifact@v6
        with:
          name: pdf-outputs
          path: |
            ${{ inputs.working-directory }}/guide.pdf
            ${{ inputs.working-directory }}/guide_no_cover.pdf
  build-epub:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: sh
        working-directory: ${{ inputs.working-directory }}
    container:
      image: pandoc/core:3.1.1.0
    steps:
      - uses: actions/checkout@v5
      - id: list-items
        run: cat $(ls -1 Chapter*.md | sort -V | tr '\n' ' ' | sed 's/ $//') | sed 's/^####.*/#& {-}/' > guide.md
      - run: |
          crossref_file="crossref.yaml"
          if [ "${{ inputs.working-directory }}" = "main-en" ]; then
            crossref_file="../crossref-en.yaml"
          fi
          /usr/bin/awk 'BEGIN{go=0;}{ if (go==1){print;} else {if($$0 ~ /^#/) { go=1;print;}}}' guide.md | pandoc -t epub3 -F pandoc-crossref -o guide.epub -N -M "crossrefYaml=${crossref_file}" --metadata-file=config-epub.yaml --epub-cover-image=image/Cover/電子版表紙_300dpi_2480x3508.png --css=../epub.css
      - uses: actions/upload-artifact@v6
        with:
          name: guide.epub
          path: ${{ inputs.working-directory }}/guide.epub
